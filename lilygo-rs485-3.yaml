        sorting_weight: 6
    ssid:
      name: ESPHome SSID
      icon: mdi:wifi
      web_server:
        sorting_group_id: Diagnostic
        sorting_weight: 5

  - platform: version
    name: ESP Version
    hide_timestamp: true
    disabled_by_default: false
    icon: mdi:new-box
    entity_category: diagnostic
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 19

  - platform: modbus_controller
    id: wifi_status
    name: "Battery Wifi Status"
    modbus_controller_id: mt
    register_type: holding
    address: 30300
    raw_encode: NONE
    icon: mdi:wifi-alert
    entity_category: diagnostic
    skip_updates: 20
    lambda: |-
      uint16_t int_mode = (data[item->offset] << 8) + data[item->offset+1];
      ESP_LOGD("main","Parsed operation mode int : %d", int_mode);
      std::string mode_str;
      switch (int_mode) {
        case 0: mode_str = "Disconnected"; break;
        case 1: mode_str = "Connected"; break;
      }
      return mode_str;
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 14

  - platform: modbus_controller
    id: bt_status
    name: "BT Status"
    modbus_controller_id: mt
    register_type: holding
    address: 30301
    raw_encode: NONE
    icon: mdi:home-heart
    entity_category: diagnostic
    skip_updates: 20
    lambda: |-
      uint16_t int_mode = (data[item->offset] << 8) + data[item->offset+1];
      ESP_LOGD("main","Parsed operation mode int : %d", int_mode);
      std::string mode_str;
      switch (int_mode) {
        case 0: mode_str = "Disconnected"; break;
        case 1: mode_str = "Active after boot"; break;
        case 2: mode_str = "Connected"; break;
        case 3: mode_str = "Active"; break;
      }
      return mode_str;
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 15

  - platform: modbus_controller
    id: cloud_status
    name: "Cloud Status"
    modbus_controller_id: mt
    register_type: holding
    address: 30302
    raw_encode: NONE
    icon: mdi:home-heart
