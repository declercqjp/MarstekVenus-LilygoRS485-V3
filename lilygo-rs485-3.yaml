      sorting_weight: 16


# Added by JP, address 42000 can only be set to "Enabled", 
# Control Mode has to be set in Marstek app or/and also via User Work Mode to "Manual"

  - platform: template
    name: "Marstek RS485 Control Mode"
    id: rs485_control_mode_label
    web_server:
      sorting_group_id: Rs485
      sorting_weight: 1

  - platform: modbus_controller
    modbus_controller_id: mt
    name: "RS485 Control Raw"
    address: 42000
    register_type: holding
    raw_encode: HEXBYTES
    internal: true  # verberg in webserver
    on_value:
          then:
            - lambda: |-
                static std::string last_val = "";
                if (x != last_val) {
                  const char* label;
                  if (x == "55aa") label = "enabled";
                  else if (x == "55bb") label = "disabled";
                  else label = x.c_str();
                  id(rs485_control_mode_label).publish_state(label);
                  ESP_LOGI("control", "RS485 control mode -> %s", label);
                  if (x == "55bb") {
                    ESP_LOGW("control", "Marstek App has controle !");
                  }
                  last_val = x;
                }


