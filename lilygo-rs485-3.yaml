sensor:
# Start ORIGINAL Fonske 

  - id: ems_version # No name, since it's internal
    icon: mdi:factory
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30200
    value_type: U_WORD
    accuracy_decimals: 0
    skip_updates: 60 # 5 minutes
    internal: true
    on_value:
      then:
        - lambda: |-
            int version = (int)x;
            char buf[5];
            sprintf(buf, "V%d", version);
            id(ems_version_text).publish_state(buf);

  - id: vns_version # No name, since it's internal
    icon: mdi:factory
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30202
    value_type: U_WORD
    accuracy_decimals: 0
    skip_updates: 60 # 5 minutes
    internal: true
    on_value:
      then:
        - lambda: |-
            int version = (int)x;
            char buf[5];
            sprintf(buf, "V%d", version);
            id(vns_version_text).publish_state(buf);

  - id: bms_version # No name, since it's internal
    icon: mdi:factory
    platform: modbus_controller
    modbus_controller_id: mt
    register_type: holding
    address: 30204 #31102
