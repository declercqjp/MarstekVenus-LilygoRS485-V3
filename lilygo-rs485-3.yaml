select:
  - name: "Marstek RS485 Control Mode"
    id: "lilygo_rs485_marstek_rs485_control_mode"
    icon: mdi:connection
    platform: modbus_controller
    modbus_controller_id: mt
    address: 42000
    value_type: U_WORD
    optionsmap:
      "enable": 21930
      "disable": 21947
    skip_updates: 0 # 0 seconds
    web_server:
      sorting_group_id: Control1  # only as info in webserver, needs to be visible for automations
      sorting_weight: 1
#    web_server:
#      sorting_group_id: Controls  # Not used in group Control V3
#      sorting_weight: 1

    on_value:
      then:
        - lambda: |-
            static std::string last_val = "";
            std::string curr_val = x.c_str();
            if (curr_val != last_val) {
              ESP_LOGI("control", "RS485 control mode gewijzigd -> %s", curr_val.c_str());
              last_val = curr_val;
            }

  - name: "Marstek Forcible Charge-Discharge" 
    id: "lilygo_rs485_marstek_forcible_charge_discharge"
    platform: modbus_controller
    modbus_controller_id: mt
    address: 42010
    value_type: U_WORD
    optionsmap:
      "stop": 0
      "charge": 1
      "discharge": 2
    skip_updates: 2 # 10 seconds
    web_server:
      sorting_group_id: Controls
      sorting_weight: 6
    on_value:
      then:
      - lambda: |-
