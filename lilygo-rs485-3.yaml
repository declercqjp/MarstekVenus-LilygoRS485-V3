script:
  - id: rs485_disable_script
    then:
      - select.set:
          id: lilygo_rs485_marstek_user_work_mode
          option: "manual"
      - delay: 12s
      - select.set:
          id: lilygo_rs485_marstek_user_work_mode
          option: "anti-feed"

  - id: rs485_enable_script
    then:
      - select.set:
          id: lilygo_rs485_marstek_rs485_control_mode
          option: "enable"


button:
  - platform: template
    name: "RS485 Mode -> Disable"
    icon: mdi:toggle-switch-off
    web_server:
      sorting_group_id: Rs485
      sorting_weight: 3
    on_press:
      then:
        - script.execute: rs485_disable_script

  - platform: template
    name: "RS485 Mode -> Enable"
    icon: mdi:toggle-switch
    web_server:
      sorting_group_id: Rs485
      sorting_weight: 2
    on_press:
      then:
        - script.execute: rs485_enable_script


  - platform: restart
    name: "LilyGo Restart"
    web_server:
      sorting_group_id: Controls
      sorting_weight: 10

     # JP added Marstek Restart button  #     
  - platform: template
    name: "Marstek Device Restart"
    id: marstek_device_restart
    icon: mdi:restart
    on_press:
      - lambda: |-
          esphome::modbus_controller::ModbusController *controller = id(mt);
          if (controller != nullptr) {
            std::vector<uint16_t> data = {0x55AA};
            controller->queue_command(
              esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
                controller, 41000, data[0]
              )
            );
            ESP_LOGI("modbus", "Device restart command verzonden");
          }
    web_server:
      sorting_group_id: Controls
      sorting_weight: 13

  - platform: template
    name: "RS485 Control Mode: Info -->"
    id: marstek_rs485_text
    icon: mdi:information-outline
    web_server:
      sorting_group_id: Rs485
      sorting_weight: 4
    on_press:
      then:
        - logger.log:
            level: Info
            format: >-
              !!!
              INFO: Due to limitations in V3: the Marstek RS485 control mode can only be disabled via a script on the web server. Therefore, you will not see the original control. -- 
              The script takes some seconds to run --
              You can still see the control in Home Assistant and use it normally with your automations.
              !!!

  
