light:
  - platform: esp32_rmt_led_strip
    id: status_led
    icon: mdi:led-outline
    name: "Status LED"
    chipset: WS2812
    pin: GPIO4
    num_leds: 1
    rgb_order: GRB
    web_server:
      sorting_group_id: Diagnostic
      sorting_weight: 15
    effects:
      - pulse:
          name: "Fast Blink Red"
          transition_length: 0.3s
          update_interval: 0.6s
          min_brightness: 20%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink Purple"
          transition_length: 0.3s
          update_interval: 0.6s
          min_brightness: 20%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink Blue"
          transition_length: 0.3s
          update_interval: 0.6s
          min_brightness: 20%
          max_brightness: 100%


interval:
  - interval: 15s
    then:
      - lambda: |-
          static int last_status = 0;
          
          bool batt_ok = !isnan(id(battery_soc).state);
          bool wifi_ok = id(wifi_signal_strength).state > -80.0f;
          
          int new_status = 0;
          if (batt_ok && wifi_ok) {
            new_status = 1;  // grün
          } else if (!batt_ok && !wifi_ok) {
            new_status = 2;  // rot blinkend
          } else if (!wifi_ok) {
            new_status = 3;  // blau blinkend
          } else {
            new_status = 4;  // lila blinkend
          }
          
          if (new_status == last_status) return;
          last_status = new_status;
          
          // Status 1: grün
          if (last_status == 1) {
            id(status_led)->turn_on()
              .set_red(0.0f)
              .set_green(1.0f)
              .set_blue(0.0f)
              .set_brightness(0.3f)
              .set_effect("none")
              .perform();
          }
          // Status 2: rot blinkend
          else if (last_status == 2) {
            id(status_led)->turn_on()
              .set_red(1.0f)
              .set_green(0.0f)
              .set_blue(0.0f)
              .set_effect("Fast Blink Red")
              .perform();
          }
          // Status 3: blau blinkend
          else if (last_status == 3) {
            id(status_led)->turn_on()
              .set_red(0.0f)
              .set_green(0.0f)
              .set_blue(1.0f)
              .set_effect("Fast Blink Blue")
              .perform();
          }
          // Status 4: lila blinkend
          else if (last_status == 4) {
            id(status_led)->turn_on()
              .set_red(1.0f)
              .set_green(0.0f)
              .set_blue(1.0f)
              .set_effect("Fast Blink Purple")
              .perform();
          }

