esphome:
  name: lilygo-rs485-3
  friendly_name: LILYGO RS485-3
  on_boot:
    priority: -100
    then:
      - delay: 15s
      - logger.log:
          level: INFO
          format: >-
            !!! INFO: Due to limitations in V3: the Marstek RS485 control mode
            can only be disabled via a script on the web server --- Therefore, you
             see the original control only as info --- When you press the button, it takes some seconds for the script to run
             --- You can still see and use the control in Home Assistant and use it
            normally with your Automations. !!!
      - delay: 25s
      - component.update: battery_remaining_capacity


##THIS CONFIG IS ONLY FOR THE LILYGO T-CAN485, ITS NOT TESTET ON ANY OTHER DEVICE##
## V2 from: https://github.com/Superduper1969/MarstekVenus-LilygoRS485 ##
## V2 from: https://github.com/whyisthisbroken/marstek-lilygo-rs485?hl=nl-NL ##
## V3 from: https://github.com/fonske/MarstekVenus-LilygoRS485 ##
## The rest is added by JP :-) ##
esp32:
  board: esp32dev
  framework:
    type: esp-idf

    advanced:
      minimum_chip_revision: "3.1" 
      sram1_as_iram: true
      compiler_optimization: PERF
      disable_libc_locks_in_iram: true
      enable_lwip_tcpip_core_locking: true
      enable_lwip_mdns_queries: false
    sdkconfig_options:
      CONFIG_BOOTLOADER_LOG_LEVEL_WARN: "y"
      CONFIG_BT_ENABLED: "n"
      CONFIG_ESP32_ALLOW_RTC_FAST_MEM_AS_HEAP: "y"
      CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED: "y"
      CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED: "y"
      CONFIG_ESP32_WIFI_IRAM_OPT: "y"
      CONFIG_ESP32_WIFI_RX_IRAM_OPT: "y"
      CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM: "16"   
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: "y"
      CONFIG_LOG_MAXIMUM_LEVEL_INFO: "y"
      CONFIG_LWIP_IRAM_OPTIMIZATION: "y"
      CONFIG_LWIP_IPV6: "n"
      CONFIG_LWIP_SO_REUSE: "y"
      CONFIG_LWIP_STATS: "n"
      CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "32"
      CONFIG_LWIP_TCP_MSS: "1436"
      CONFIG_LWIP_TCP_SND_BUF_DEFAULT: "5744"
      CONFIG_LWIP_TCP_WND_DEFAULT: "5744"
      CONFIG_NEWLIB_NANO_FORMAT: "y"
      CONFIG_UART_ISR_IN_IRAM: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "20"   # Was 10, geef meer tijd


logger:
  baud_rate: 0
  level: INFO

# Enable Home Assistant API
api:


ota:
  - platform: esphome      # Voor updates via de HA Dashboard
  - platform: web_server   # DIT voegt de upload-knop toe aan de webinterface

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: false
  reboot_timeout: 15min
  power_save_mode: none
  output_power: 12dB
  use_address: 192.168.0.103

  manual_ip:
    static_ip: 192.168.0.103
    gateway: 192.168.0.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Lilygo-Rs485-2 Fallback Hotspot"
    password: "12345678"



captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: false
  local: true
  sorting_groups:
    - id: Rs485
      name: "RS485"
      sorting_weight: -60
    - id: Control1
      name: "RS485 Control only for use in HA"
      sorting_weight: -50
    - id: Controls
      name: "Controls"
      sorting_weight: -40
    - id: Info
      name: "Info"
      sorting_weight: -30
    - id: Warnings
      name: "Warnings"
      sorting_weight: -20
    - id: Diagnostic
      name: "Diagnostic"
      sorting_weight: -10

## Using Home Assistant for Time sync
time:
  - platform: homeassistant
    id: homeassistant_time

##Pins required for LilyGo T-CAN485 board
output:
  - platform: gpio
    id: ENABLE_PIN # Enable the chip
    pin:
      number: GPIO19
      inverted: true
  - platform: gpio
    id: SE_PIN # Enable autodirection
    pin:
      number: GPIO17
      inverted: true
  - platform: gpio
    id: ENABLE_5V_PIN # Enable 5V pin for RS485 chip
    pin:
      number: GPIO16
      inverted: true

# Configure UART
uart:
  - id: mod_bus
    rx_pin: GPIO21
    tx_pin: GPIO22
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE

modbus:
  - uart_id: mod_bus
    id: modbus1
    send_wait_time: 50ms

modbus_controller:
  - id: mt
    address: 0x1
    modbus_id: modbus1
    setup_priority: -100
    command_throttle: 50ms
    update_interval: 10s
    offline_skip_updates: 5

